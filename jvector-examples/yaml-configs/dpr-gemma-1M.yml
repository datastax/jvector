yamlSchemaVersion: 1
onDiskIndexVersion: 6

dataset: dpr-1M

construction:
  outDegree: [64]
  efConstruction: [200]
  neighborOverflow: [1.6f]
  addHierarchy: [Yes]
  refineFinalGraph: [Yes]
  fusedGraph: [No]
  compression:
    - type: ASH
      parameters:
        encodedBits: 776
        optimizer: itq
        landmarkCount: 1
    - type: ASH
      parameters:
        encodedBits: 392
        optimizer: itq
        landmarkCount: 1
    - type: PQ
      parameters:
        m: 97 # we can either specify the integer m or the integer mFactor. In this case, m will be set to the data dimensionality divided by mFactor
        # mFactor: 8
        # k: 256 # optional parameter. By default, k=256
        centerData: No
        anisotropicThreshold: -1.0 # optional parameter. By default, anisotropicThreshold=-1 (i.e., no anisotropy)
    - type: PQ
      parameters:
        m: 49 # we can either specify the integer m or the integer mFactor. In this case, m will be set to the data dimensionality divided by mFactor
        # mFactor: 8
        # k: 256 # optional parameter. By default, k=256
        centerData: No
        anisotropicThreshold: -1.0 # optional parameter. By default, anisotropicThreshold=-1 (i.e., no anisotropy)
  reranking:
    - FP
  useSavedIndexIfExists: Yes # If yes, the system will attempt to locate a cached copy of the index instead of constructing

search:
  topKOverquery:
    10: [1.00, 1.25, 1.56, 1.95, 2.44, 3.05, 3.81, 4.77, 5.96, 7.45, 9.31, 11.64]
#    100: [1.0]
  useSearchPruning: [No]
  compression:
    - type: ASH
      parameters:
        encodedBits: 776
        optimizer: itq
        landmarkCount: 1
    - type: ASH
      parameters:
        encodedBits: 392
        optimizer: itq
        landmarkCount: 1
    - type: PQ
      parameters:
        m: 97 # we can either specify the integer m or the integer mFactor. In this case, m will be set to the data dimensionality divided by mFactor
        # mFactor: 8
        # k: 256 # optional parameter. By default, k=256
        centerData: No
        anisotropicThreshold: -1.0 # optional parameter. By default, anisotropicThreshold=-1 (i.e., no anisotropy)
    - type: PQ
      parameters:
        m: 49 # we can either specify the integer m or the integer mFactor. In this case, m will be set to the data dimensionality divided by mFactor
        # mFactor: 8
        # k: 256 # optional parameter. By default, k=256
        centerData: No
        anisotropicThreshold: -1.0 # optional parameter. By default, anisotropicThreshold=-1 (i.e., no anisotropy)
# Run-level controls, such as benchmarks, console, and logging, are in run.yml.