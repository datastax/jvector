name: Run Bench Main

on:
  workflow_dispatch:
    inputs:
      benchmark_config:
        description: 'Benchmark dataset regex (leave empty for all)'
        required: false
        default: ''
      tags:
        description: 'Space-separated list of tags to benchmark'
        required: true
        default: '4.0.0-rc.1'
  push:
    branches:
      - github_actions

jobs:
  test-avx512:
    concurrency:
      group: ${{ matrix.isa }}-${{ matrix.jdk }}
      cancel-in-progress: false
    strategy:
      matrix:
        jdk: [ 24 ]
        isa: [ isa-avx512f ]
    runs-on: ${{ matrix.isa }}
    steps:
      - name: verify-avx512
        run: |
          # avx2 is included just for illustration
          required="avx2 avx512f avx512cd avx512bw avx512dq avx512v"
          printf "required ISA feature flags: %s\n" "${required}" 
          flags="$(lscpu|grep '^Flags'|cut -d: -f2)"
          output=""
          for flag in ${required} ; do
           if [[ " $flags " == *"${flag}"* ]]
           then output="${output} $flag(OK)"
           else output="${output} $flag(FAIL)"
          fi ; done
          printf "%s\n" ${output}
          if [[ " $output " == *"FAIL"* ]] ; then exit 2 ; fi
      - name: Set up GCC
        run: |
          sudo apt install -y gcc
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.jdk }}
          distribution: temurin
          cache: maven

      - name: Checkout specific tag
        run: git checkout ${{ matrix.tag }}

      - name: Get version from pom.xml
        id: get-version
        run: |
          VERSION=$(grep -o '<version>[^<]*</version>' pom.xml | head -1 | sed 's/<version>\(.*\)<\/version>/\1/')
          if [[ "$VERSION" == *'${revision}'* ]]; then
            REVISION=$(grep -o '<revision>[^<]*</revision>' pom.xml | head -1 | sed 's/<revision>\(.*\)<\/revision>/\1/')
            if [ -n "$REVISION" ]; then
              VERSION=${VERSION//\$\{revision\}/$REVISION}
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag ${{ matrix.tag }} has version $VERSION"

      - name: Build with Maven (JDK 24)
        if: matrix.jdk == '24'
        run: mvn -B -Punix-amd64-profile package --file pom.xml

      - name: Run Bench
        run: |
          # Use the jar-with-dependencies which includes all required dependencies
          java ${{ matrix.jdk >= 20 && '--enable-native-access=ALL-UNNAMED --add-modules=jdk.incubator.vector' || '' }} \
            ${{ matrix.jdk >= 22 && '-Djvector.experimental.enable_native_vectorization=true' || '' }} \
            -cp jvector-examples/target/jvector-examples-*-jar-with-dependencies.jar io.github.jbellis.jvector.example.AutoBenchYAML --output bench-results 
          
          # List files in current directory to help with debugging
          echo "Files in current directory:"
          ls -la

      - name: Upload Bench Results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ matrix.isa }}-${{ matrix.tag }}
          path: |
            bench-results.json
            bench-results.csv
          if-no-files-found: warn

      - name: Download Previous Benchmark Results
        uses: actions/download-artifact@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install argparse matplotlib pandas

      - name: Combine results and create visualizations
        run: |
          cat > visualize.py << 'EOF'
          import os
          import glob
          import pandas as pd
          import matplotlib.pyplot as plt
          
          # Find all CSV files
          csv_files = glob.glob('benchmark-results-*/benchmark-*.csv')
          
          # Read and combine all results
          dfs = []
          for file in csv_files:
              df = pd.read_csv(file)
              dfs.append(df)
          
          if not dfs:
              print("No benchmark results found!")
              exit(1)
          
          combined_df = pd.concat(dfs)
          combined_df.to_csv('all_benchmark_results.csv', index=False)
          print(f"Combined {len(dfs)} benchmark results")
          
          # Sort by version for proper ordering in plots
          combined_df['version_sort'] = combined_df['version'].str.replace('v', '').apply(lambda x: [int(p) if p.isdigit() else p for p in x.split('.')])
          combined_df = combined_df.sort_values('version_sort')
          
          # Create plots for each metric
          metrics = ['QPS', 'Mean Latency', 'Recall@10']
          for metric in metrics:
              plt.figure(figsize=(10, 6))
          
              for dataset, group in combined_df.groupby('dataset'):
                  plt.plot(group['version'], group[metric], marker='o', label=dataset)
          
              plt.title(f"{metric} Across JVector Versions")
              plt.xlabel("Version")
              plt.ylabel(metric)
              plt.xticks(rotation=45)
              plt.grid(True, linestyle='--', alpha=0.7)
              plt.legend()
              plt.tight_layout()
          
              safe_metric = metric.replace('@', '_at_').replace(' ', '_')
              plt.savefig(f"{safe_metric}.png")
              print(f"Created plot for {metric}")
          
          # Create a summary markdown report
          with open('benchmark_report.md', 'w') as f:
              f.write("# JVector Historical Benchmark Results\n\n")
              f.write(f"Comparing {len(combined_df['version'].unique())} versions of JVector\n\n")
          
              f.write("## Summary Table\n\n")
              f.write(combined_df[['version', 'dataset', 'QPS', 'Mean Latency', 'Recall@10']].to_markdown(index=False))
          
              f.write("\n\n## Visualizations\n\n")
              for metric in metrics:
                  safe_metric = metric.replace('@', '_at_').replace(' ', '_')
                  f.write(f"### {metric}\n\n")
                  f.write(f"![{metric} Chart]({safe_metric}.png)\n\n")
          
          print("Created benchmark report")
          EOF
          
          python visualize.py

      - name: Upload combined results and visualizations
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-summary
          path: |
            all_benchmark_results.csv
            *.png
            benchmark_report.md
          retention-days: 90
